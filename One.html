<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster - SAT Prep</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        
        <header class="header">
            <div class="stat">🔥 Streak: <span id="streak-count">0</span></div>
            <div class="stat">⭐ XP: <span id="xp-count">0</span></div>
            <div class="stat">🎓 Lvl: <span id="level-count">1</span></div>
        </header>

        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <nav class="nav-buttons">
            <button class="btn btn-blue" id="nav-learn">📚 Learn Mode</button>
            <button class="btn btn-purple" id="nav-practice">🎯 Practice Mode</button>
        </nav>

        <main class="main-content">
            
            <section id="learn-section" class="card">
                <h2 id="learn-word" class="word-title">Loading...</h2>
                <p id="learn-pos" class="word-pos">part of speech</p>
                
                <div class="word-detail">
                    <strong>📖 Definition:</strong>
                    <p id="learn-def">Definition goes here.</p>
                </div>
                
                <div class="word-detail">
                    <strong>🧩 Roots & Affixes:</strong>
                    <p id="learn-roots">Roots go here.</p>
                </div>

                <div class="word-detail">
                    <strong>📝 Example:</strong>
                    <p id="learn-example">Example sentence goes here.</p>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-gray" id="btn-next-word">Skip / Next</button>
                    <button class="btn btn-green" id="btn-mark-learned">✅ Mark as Learned</button>
                </div>
            </section>

            <section id="practice-section" class="card hidden">
                <h2 class="section-title">Practice Mode</h2>
                <div id="practice-container">
                    <p class="quiz-question">What is the definition of: <strong id="quiz-word" class="highlight">word</strong>?</p>
                    <div id="quiz-options" class="options-container">
                        </div>
                    <p id="quiz-feedback" class="feedback-text hidden"></p>
                    <button class="btn btn-blue hidden" id="btn-next-quiz">Next Question</button>
                </div>
                <div id="practice-empty" class="hidden">
                    <p>You need to learn at least 4 words before you can practice!</p>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
